<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · Seyf</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d3531;
      --surface: #15534a;
      --text: #e8f5f1;
      --muted: #a0c4bb;
      --accent: #2dd4a7;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem 1.5rem;
      text-align: center;
      gap: 1.5rem;
    }

    .icon {
      width: 64px;
      height: 64px;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 28ch;
    }

    button {
      margin-top: 0.5rem;
      background: var(--accent);
      color: #0d3531;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="32" cy="32" r="28" stroke="#2dd4a7" stroke-width="3" stroke-dasharray="6 4" />
    <path d="M22 32h20M32 22v20" stroke="#2dd4a7" stroke-width="3" stroke-linecap="round" />
    <line x1="16" y1="16" x2="48" y2="48" stroke="#e8f5f1" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
  </svg>

  <h1>Sin conexión</h1>
  <p>Revisa tu internet e inténtalo de nuevo. Tus datos están a salvo.</p>

  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
